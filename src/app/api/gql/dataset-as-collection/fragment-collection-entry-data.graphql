fragment CollectionEntryData on CollectionEntry {
  systemTime
  path
  ref
  extraData
  asDataset {
    alias
    owner {
      accountName
      avatarUrl
    }
    head
    data {
      estimatedSizeBytes
    }
    asVersionedFile {
      latest {
        systemTime
        contentType
        contentLength
        contentHash
      }
    }
  }
}
