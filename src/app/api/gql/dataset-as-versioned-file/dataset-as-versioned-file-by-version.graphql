query datasetAsVersionedFileByVersion($datasetId: DatasetID!, $version: Int) {
  datasets {
    byId(datasetId: $datasetId) {
      name
      asVersionedFile {
        versions {
          totalCount
        }
        asOf(version: $version) {
          ...VersionedFileEntryData
        }
      }
    }
  }
}
