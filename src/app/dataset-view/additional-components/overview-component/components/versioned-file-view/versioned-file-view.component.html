<div *ngIf="loadingFileDetails$ | async">
    <mat-progress-bar data-test-id="editor-progress-bar" class="w-100 mt-4" mode="indeterminate" />
    <div class="mt-4 text-center">Loading file...</div>
</div>

<div *ngIf="fileInfo$ | async as fileDetails">
    <ngb-alert *ngIf="!isLatestVersion(fileDetails)" [dismissible]="false" class="my-4">
        A newer version of this file is available v({{ fileDetails.countVersions }}).
        <a class="text-dark fw-500 text-decoration-underline" (click)="goToLatestVersionedFile()"
            >Go to latest version</a
        >
    </ngb-alert>

    <div>
        <div class="d-flex flex-column">
            <div class="d-flex justify-content-between align-items-center">
                <div class="fs-5 fw-500">Preview</div>
                <button
                    *ngIf="fileDetails.fileInfo?.version"
                    class="border-1 bg-light border d-flex rounded-2 btn btn-sm justify-content-between align-items-center"
                    (click)="downloadFile(fileDetails)"
                >
                    <mat-icon class="mat-icon-svg-size me-2 text-muted mb-1"> download</mat-icon>

                    <span class="fs-12 me-2 d-block">Download file</span>
                </button>
            </div>
        </div>

        <div [ngSwitch]="fileDetails.fileInfo?.contentType! | previewFileType" class="my-4">
            <div *ngSwitchCase="'pdf'">
                @defer (when (pdfComponent)) {
                    <ng-container *ngComponentOutlet="pdfComponent; inputs: { safePdfUrl: urlContentPath }" />
                }
            </div>

            <div *ngSwitchCase="'image'" class="text-center box p-4 mt-4 bg-light">
                <img [src]="urlContentPath" class="preview-img" />
            </div>

            <div *ngSwitchCase="'svg'" class="text-center box p-4 mt-4 bg-light">
                <mat-icon svgIcon="custom-svg" class="preview-svg"></mat-icon>
            </div>

            <div *ngSwitchCase="'json'" class="box p-2 bg-light mt-4">
                <pre *ngIf="contentText$ | async as contentJson"> {{ contentJson | json }}</pre>
            </div>

            <div class="mt-4" *ngSwitchCase="'text'" class="box p-2 bg-light mt-4">
                <p>{{ contentText$ | async }}</p>
            </div>

            <div class="mt-4" *ngSwitchCase="'video'" class="box p-2 bg-light mt-4">
                <video controls preload="auto" width="100%" height="500px" [src]="urlContentPath" playsinline>
                    Your browser does not support embedded videos
                </video>
            </div>

            <div class="mt-4" *ngSwitchCase="'audio'" class="box p-4 bg-light">
                <audio controls preload="auto" controlsList="nodownload">
                    <source [src]="urlContentPath" [type]="fileDetails.fileInfo?.contentType" />
                    Your browser does not support the audio element.
                </audio>
            </div>

            <div class="mt-4 text-center" *ngSwitchDefault>
                <div *ngIf="fileDetails.fileInfo">
                    <p class="fs-5 box p-4 bg-light">File preview is not supported</p>
                </div>
                <div class="box p-4 bg-light" *ngIf="!fileDetails.fileInfo?.contentType">
                    <span>File is empty</span>
                </div>
            </div>
        </div>
    </div>
</div>
