<div *ngIf="loadingFile">
    <mat-progress-bar data-test-id="editor-progress-bar" class="w-100 mt-4" mode="indeterminate" />
    <div class="mt-4 text-center">Loading file...</div>
</div>
<div class="mt-4" *ngIf="fileDetails">
    <div class="d-flex align-items-center gap-2">
        <mat-icon class="mat-icon-svg-size text-muted fs-4">{{
            getFileIcon(fileDetails.fileInfo?.contentType!)
        }}</mat-icon>
        <span class="file-name mt-2 d-inline-block">{{ fileDetails.name }}</span>
    </div>
    <ngb-alert *ngIf="!isLatestVersion" [dismissible]="false" class="my-4">
        A newer version of this file is available v({{ fileDetails.countVersions }}).
        <a class="text-dark fw-500 text-decoration-underline" (click)="goToLatestVersionedFile()"
            >Go to latest version</a
        >
    </ngb-alert>

    <div>
        <div class="ms-3 d-flex flex-column">
            <div class="d-flex justify-content-between align-items-center mt-4">
                <div class="fs-5 fw-500">Preview</div>
                <button
                    class="border-1 bg-light border d-flex rounded-2 btn btn-sm justify-content-between align-items-center"
                    (click)="downloadFile()"
                >
                    <mat-icon class="mat-icon-svg-size me-2 text-muted mb-1"> download</mat-icon>

                    <span class="fs-12 me-2 d-block">Download file</span>
                </button>
            </div>
        </div>
        <div [ngSwitch]="fileDetails.fileInfo?.contentType" class="my-4">
            <!-- Pdf -->
            <div *ngSwitchCase="'application/pdf'">
                <app-pdf-viewer-content *ngIf="safePdfUrl" [safePdfUrl]="safePdfUrl" />
            </div>

            <!-- Images -->
            <ng-container *ngSwitchCase="'image/jpeg'">
                <ng-container *ngTemplateOutlet="imageBox"></ng-container>
            </ng-container>
            <ng-container *ngSwitchCase="'image/jpg'">
                <ng-container *ngTemplateOutlet="imageBox"></ng-container>
            </ng-container>
            <ng-container *ngSwitchCase="'image/png'">
                <ng-container *ngTemplateOutlet="imageBox"></ng-container>
            </ng-container>
            <ng-container *ngSwitchCase="'image/webp'">
                <ng-container *ngTemplateOutlet="imageBox"></ng-container>
            </ng-container>

            <ng-template #imageBox>
                <div class="text-center box p-4 mt-4 bg-light">
                    <img [src]="imagePath" class="preview-img" />
                </div>
            </ng-template>

            <!-- Video -->
            <ng-container *ngSwitchCase="'video/mp4'">
                <ng-container *ngTemplateOutlet="videoBox"></ng-container>
            </ng-container>

            <ng-container *ngSwitchCase="'video/quicktime'">
                <ng-container *ngTemplateOutlet="videoBox"></ng-container>
            </ng-container>

            <ng-template #videoBox>
                <div class="text-center mt-4 box p-4">
                    <video controls width="100%" height="500px" [src]="videoPath" playsinline>
                        Your browser does not support embedded videos
                    </video>
                </div>
            </ng-template>

            <!-- Text -->
            <ng-container *ngSwitchCase="'application/json'">
                <ng-container *ngTemplateOutlet="jsonBox"></ng-container>
            </ng-container>

            <ng-container *ngSwitchCase="'application/vnd.desci.collaborative+json'">
                <ng-container *ngTemplateOutlet="jsonBox"></ng-container>
            </ng-container>

            <ng-template #jsonBox>
                <div class="box p-2 bg-light mt-4">
                    <pre>{{ plainText | json }}</pre>
                </div>
            </ng-template>

            <div class="mt-4" *ngSwitchCase="'text/plain'">
                <p>{{ plainText }}</p>
            </div>

            <div class="mt-4 text-center" *ngSwitchDefault>
                <div *ngIf="fileDetails.fileInfo">
                    <p class="fs-5 box p-4 bg-light">File preview is not supported</p>
                </div>
                <div class="box p-4 bg-light" *ngIf="!fileDetails.fileInfo?.contentType">
                    <span>File is empty</span>
                </div>
            </div>
        </div>
    </div>
</div>
